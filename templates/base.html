<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CloudMetrix Engine{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        indigo: { 
                            50: '#f5f7ff', 100: '#ebf0fe', 200: '#d1dbfd', 
                            500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 900: '#312e81' 
                        },
                        slate: { 950: '#020617' }
                    }
                }
            }
        }
        // Force dark mode for premium feel unless user toggles
        function applyTheme() {
            const theme = localStorage.getItem('theme') || 'system';
            const html = document.documentElement;
            if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                html.classList.add('dark');
            } else {
                html.classList.remove('dark');
            }
        }
        applyTheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .sidebar-link { 
            display: flex; align-items: center; padding: 0.75rem 1rem; 
            font-size: 0.8rem; font-weight: 600; border-radius: 12px; 
            color: #64748b; transition: all 0.2s; gap: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .sidebar-link:hover { background-color: #f1f5f9; color: #1e293b; }
        .dark .sidebar-link { color: #94a3b8; }
        .dark .sidebar-link:hover { background-color: rgba(255,255,255,0.03); color: #f1f5f9; }
        
        .sidebar-link.active { 
            background-color: #4f46e5; color: #fff; 
            shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }
        .dark .sidebar-link.active { 
            background-color: #6366f1; color: #fff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }
        
        .card { 
            background: #fff; border: 1px solid #e2e8f0; border-radius: 20px; 
            transition: all 0.3s ease;
        }
        .dark .card { background: #0f172a; border-color: rgba(255,255,255,0.05); color: #f1f5f9; }
        
        .btn { 
            padding: 0.625rem 1.25rem; font-size: 0.75rem; font-weight: 700; 
            border-radius: 12px; display: inline-flex; align-items: center; 
            justify-content: center; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .btn-primary { background-color: #4f46e5; color: #fff; border: none; }
        .btn-primary:hover { background-color: #4338ca; transform: translateY(-1px); box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4); }
        
        .btn-outline { 
            background: transparent; border: 1px solid #e2e8f0; color: #64748b; 
        }
        .dark .btn-outline { 
            border-color: rgba(255,255,255,0.1); color: #94a3b8; 
        }
        .btn-outline:hover { background: #f8fafc; color: #1e293b; }
        .dark .btn-outline:hover { background: rgba(255,255,255,0.03); color: #fff; }

        .input-field { 
            width: 100%; border: 1px solid #e2e8f0; padding: 0.75rem 1rem; 
            border-radius: 12px; font-size: 0.875rem; outline: none; 
            background: #f8fafc; transition: all 0.2s; 
        }
        .dark .input-field { border-color: rgba(255,255,255,0.05); color: #f1f5f9; background: #0f172a; }
        .input-field:focus { border-color: #6366f1; background: #fff; }
        .dark .input-field:focus { background: #1e293b; }

        select.input-field option { background: #fff; color: #1e293b; }
        .dark select.input-field option { background: #0f172a; color: #f1f5f9; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #1e293b; }

        @keyframes pulse-indigo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-indigo { animation: pulse-indigo 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-[#f8fafc] text-slate-900 dark:bg-[#020617] dark:text-slate-100 min-h-screen flex selection:bg-indigo-500/10">
    
    <!-- Sidebar -->
    <aside class="sidebar w-72 hidden lg:flex flex-col shrink-0 h-screen sticky top-0 bg-white dark:bg-[#0f172a] border-r border-slate-100 dark:border-white/5">
        <div class="h-20 flex items-center px-8">
            <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white mr-3 shadow-xl shadow-indigo-500/20">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <div>
                <span class="font-black text-xl tracking-tighter block leading-none">CloudMetrix</span>
                <span class="text-[9px] font-bold text-indigo-500 uppercase tracking-[0.2em] mt-1 block opacity-80">v2.0 Evolution</span>
            </div>
        </div>
        
        <div class="flex-1 overflow-y-auto p-6 space-y-8">
            <nav class="space-y-1.5">
                <a href="/" class="sidebar-link {{ 'active' if request.path == '/' else '' }}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Dashboard
                </a>
                <a href="/downloader" class="sidebar-link {{ 'active' if request.path == '/downloader' else '' }}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10"></path></svg>
                    Sync Center
                </a>
                <a href="/editor" class="sidebar-link {{ 'active' if request.path == '/editor' else '' }}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    Automation Hub
                </a>
                <a href="/publisher" class="sidebar-link {{ 'active' if request.path == '/publisher' else '' }}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Live Ops
                </a>
                <a href="/accounts" class="sidebar-link {{ 'active' if request.path == '/accounts' else '' }}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    Identities
                </a>
            </nav>
        </div>

        <!-- Global Worker Status -->
        <div class="p-6 border-t border-slate-100 dark:border-white/5 bg-slate-50/50 dark:bg-slate-900/40">
            <div class="flex items-center justify-between mb-4">
                <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Engine Status</span>
                <div class="flex items-center gap-2">
                    <span class="relative flex h-2 w-2">
                        <span id="worker-pulse" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75 hidden"></span>
                        <span id="worker-dot" class="relative inline-flex rounded-full h-2 w-2 bg-slate-300 dark:bg-slate-700"></span>
                    </span>
                    <span id="worker-text" class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-tighter">Standby</span>
                </div>
            </div>
            <div class="h-1.5 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                <div id="worker-bar" class="h-full bg-indigo-500 w-0 transition-all duration-1000"></div>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
        <header class="h-20 bg-white/80 dark:bg-[#020617]/80 backdrop-blur-xl border-b border-slate-100 dark:border-white/5 flex items-center justify-between px-8 shrink-0 z-20">
            <div class="flex items-center gap-4">
                 <div class="lg:hidden w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white mr-3">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.2em] mb-0.5">Automated Hierarchy</span>
                    <div class="text-slate-900 dark:text-white font-bold text-sm flex items-center gap-2 uppercase tracking-wide">
                        {% block breadcrumb %}Dashboard{% endblock %}
                    </div>
                </div>
            </div>
            <div class="flex items-center space-x-6">
                <!-- Theme toggle and User info -->
                <button id="themeToggle" class="p-2.5 rounded-xl border border-slate-100 dark:border-white/5 text-slate-400 hover:text-indigo-500 transition-all flex items-center gap-2">
                    <svg id="theme-dark-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <svg id="theme-light-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg id="theme-system-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    <span id="theme-text" class="text-[10px] font-bold uppercase tracking-widest hidden sm:block">System</span>
                </button>
                <div class="flex items-center gap-3 pl-6 border-l border-slate-100 dark:border-white/5">
                    <div class="text-right hidden sm:block">
                        <div class="text-[11px] font-bold text-slate-900 dark:text-white leading-none">Admin Node</div>
                        <div class="text-[9px] text-emerald-500 font-bold uppercase tracking-widest mt-1">Authorized</div>
                    </div>
                    <div class="w-10 h-10 rounded-2xl bg-slate-50 dark:bg-white/5 flex items-center justify-center text-slate-400 border border-slate-100 dark:border-white/5">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-10 relative">
            <div class="max-w-7xl mx-auto">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        // Global theme toggle (cycles: dark -> light -> system)
        function updateThemeUI() {
            const theme = localStorage.getItem('theme') || 'system';
            document.getElementById('theme-dark-icon').classList.toggle('hidden', theme !== 'dark');
            document.getElementById('theme-light-icon').classList.toggle('hidden', theme !== 'light');
            document.getElementById('theme-system-icon').classList.toggle('hidden', theme !== 'system');
            document.getElementById('theme-text').textContent = theme;
            applyTheme();
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            const themes = ['dark', 'light', 'system'];
            const current = localStorage.getItem('theme') || 'system';
            const next = themes[(themes.indexOf(current) + 1) % 3];
            localStorage.setItem('theme', next);
            updateThemeUI();
        });
        updateThemeUI();
    </script>

    <div id="toast-container" class="fixed bottom-10 right-10 flex flex-col gap-3 z-[1000]"></div>

    <script>
        // Global SOP Brand Notification System
        function showToast(msg, type = 'info', action = null) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const styles = {
                success: 'bg-emerald-600 border-emerald-500 shadow-emerald-500/10',
                error:   'bg-red-600 border-red-500 shadow-red-500/10',
                warn:    'bg-amber-500 border-amber-400 shadow-amber-500/10',
                info:    'bg-indigo-600 border-indigo-500 shadow-indigo-500/10'
            };

            toast.className = `flex flex-col gap-3 p-4 pr-6 min-w-[300px] rounded-2xl border text-white shadow-2xl transform translate-x-10 opacity-0 transition-all duration-500 ease-out backdrop-blur-md ${styles[type] || styles.info}`;
            
            let actionHtml = '';
            if (action) {
                actionHtml = `
                    <div class="flex gap-2 mt-1">
                        <button onclick="${action.callback}" class="px-3 py-1 bg-white/20 hover:bg-white/30 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-colors">${action.label}</button>
                    </div>
                `;
            }

            toast.innerHTML = `
                <div class="flex items-start gap-3">
                    <div class="shrink-0 mt-0.5">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div class="flex-1">
                        <p class="text-[11px] font-bold uppercase tracking-[0.05em] leading-relaxed">${msg}</p>
                        ${actionHtml}
                    </div>
                    <button class="toast-close ml-2 opacity-50 hover:opacity-100 transition-opacity">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div class="absolute bottom-0 left-0 h-1 bg-white/30 rounded-full transition-all duration-[5000ms] ease-linear w-full toast-progress"></div>
            `;

            container.appendChild(toast);

            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-x-10', 'opacity-0');
            });

            // Progress bar start
            setTimeout(() => {
                const bar = toast.querySelector('.toast-progress');
                if (bar) bar.style.width = '0%';
            }, 50);

            const dismiss = () => {
                toast.classList.add('translate-x-10', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            };

            toast.querySelector('.toast-close').onclick = dismiss;
            
            // Auto-dismiss after 5s
            const timer = setTimeout(dismiss, 5000);
        }

        // Global worker status engine
        async function pollGlobalWorker() {
            try {
                const [dlRes, postRes] = await Promise.all([
                    fetch('/api/download-progress').catch(() => null),
                    fetch('/api/post-progress').catch(() => null)
                ]);
                
                if (!dlRes || !postRes) return;
                const dl = await dlRes.json();
                const post = await postRes.json();
                
                const dot = document.getElementById('worker-dot');
                const pulse = document.getElementById('worker-pulse');
                const text = document.getElementById('worker-text');
                const bar = document.getElementById('worker-bar');
                
                if (dl.status === 'running' || post.status === 'running') {
                    dot.className = 'relative inline-flex rounded-full h-2 w-2 bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]';
                    pulse.classList.remove('hidden');
                    text.textContent = dl.status === 'running' ? 'SYNCING SESSION' : 'POSTING ACTIVE';
                    text.className = 'text-[10px] font-bold text-emerald-500 uppercase tracking-tighter';
                    bar.className = 'h-full bg-indigo-500 w-full transition-all duration-[3000ms] ease-in-out';
                    bar.style.width = dl.status === 'running' ? dl.progress_percent + '%' : '95%';
                } else if (dl.status === 'preview_ready') {
                    dot.className = 'relative inline-flex rounded-full h-2 w-2 bg-amber-400';
                    pulse.classList.add('hidden');
                    text.textContent = 'PAYLOAD READY';
                    text.className = 'text-[10px] font-bold text-amber-500 uppercase tracking-tighter';
                    bar.style.width = '100%';
                    bar.className = 'h-full bg-amber-400 w-full';
                } else {
                    dot.className = 'relative inline-flex rounded-full h-2 w-2 bg-slate-300 dark:bg-slate-700';
                    pulse.classList.add('hidden');
                    text.textContent = 'STANDBY';
                    text.className = 'text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-tighter';
                    bar.style.width = '0%';
                }
            } catch (e) {}
        }
        setInterval(pollGlobalWorker, 4000);
        pollGlobalWorker();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
